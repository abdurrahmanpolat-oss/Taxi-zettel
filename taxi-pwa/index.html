<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Taxi Zettel">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Taxi Tageszettel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --green: #1F7A4D;
    --green-light: #E2EFDA;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --amber: #854F0B;
    --amber-light: #FAEEDA;
    --gray: #5F5E5A;
    --gray-light: #F1EFE8;
    --border: #e0dfd8;
    --bg: #ffffff;
    --bg2: #f7f6f3;
    --bg3: #f1f0ec;
    --text: #1a1a18;
    --text2: #5F5E5A;
    --text3: #888780;
    --radius: 10px;
    --radius-lg: 14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --border: #3a3935;
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2d2a;
      --text: #f0efe8;
      --text2: #b4b2a9;
      --text3: #888780;
      --blue-light: #0c2540;
      --green-light: #0a2018;
      --red-light: #2a0f0f;
      --amber-light: #2a1800;
      --gray-light: #2c2c2a;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Top-Bar ── */
  .topbar {
    background: var(--blue);
    color: #fff;
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .topbar p { font-size: 12px; opacity: 0.75; margin-top: 1px; }

  /* ── Tab-Bar ── */
  .tabbar {
    display: flex;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 60px;
    z-index: 99;
  }
  .tab-btn {
    flex: 1;
    padding: 11px 8px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s;
  }
  .tab-btn.active {
    color: var(--blue);
    border-bottom-color: var(--blue);
  }

  /* ── Sections ── */
  .section { display: none; padding: 14px 12px 80px; }
  .section.active { display: block; }

  /* ── Cards ── */
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text3);
    margin-bottom: 12px;
  }

  /* ── Fahrer-Chips ── */
  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
  .chip {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip.sel {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
  }

  /* ── Form-Felder ── */
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 5px;
    font-weight: 500;
  }
  .field input, .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    appearance: none;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(24,95,165,0.12);
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ── Abzüge ── */
  .abzug-row {
    display: flex;
    gap: 7px;
    margin-bottom: 9px;
    align-items: center;
  }
  .abzug-row input {
    width: 100px;
    flex-shrink: 0;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
  }
  .abzug-row select {
    flex: 1;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    appearance: none;
  }
  .abzug-row .del {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--red-light);
    color: var(--red);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .add-abzug {
    width: 100%;
    padding: 10px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    margin-top: 4px;
  }

  /* ── Zusammenfassung ── */
  .summary {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 12px;
    margin-top: 12px;
  }
  .sum-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
  }
  .sum-row .lbl { color: var(--text2); }
  .sum-row.total {
    border-top: 1px solid var(--border);
    margin-top: 7px;
    padding-top: 9px;
    font-size: 16px;
    font-weight: 600;
  }

  /* ── Speichern-Button ── */
  .save-btn {
    width: 100%;
    padding: 14px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: var(--radius-lg);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    letter-spacing: -0.2px;
  }
  .save-btn:active { opacity: 0.85; transform: scale(0.99); }

  /* ── Toast ── */
  .toast {
    display: none;
    background: var(--green);
    color: #fff;
    padding: 12px 16px;
    border-radius: var(--radius);
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    margin-top: 10px;
  }

  /* ── Liste ── */
  .zettel-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px;
    margin-bottom: 10px;
  }
  .zettel-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .zettel-name { font-size: 16px; font-weight: 600; color: var(--text); }
  .zettel-date { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .taxi-badge {
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--blue-light);
    color: var(--blue);
    font-size: 12px;
    font-weight: 600;
  }
  .zettel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }
  .kv { font-size: 12px; }
  .kv .k { color: var(--text3); }
  .kv .v { color: var(--text); font-weight: 500; }
  .abz-line {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .zettel-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .bar-val { font-size: 18px; font-weight: 700; }
  .bar-val.pos { color: var(--green); }
  .bar-val.neg { color: var(--red); }
  .del-btn {
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--red-light);
    color: var(--red);
    font-size: 13px;
    cursor: pointer;
  }

  /* ── Statistik ── */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px;
    text-align: center;
  }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .fahrer-stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .fahrer-stat .fn { font-size: 14px; font-weight: 500; }
  .fahrer-stat .fd { font-size: 12px; color: var(--text3); }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
    font-size: 14px;
  }
  .empty .ico { font-size: 40px; margin-bottom: 10px; }

  /* ── Filter ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
  }
  .filter-chip.active {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
  }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>🚕 Taxi Tageszettel</h1>
    <p id="topbar-count">Lade...</p>
  </div>
</div>

<div class="tabbar">
  <button class="tab-btn active" onclick="showTab('erfassen',this)">✏️ Erfassen</button>
  <button class="tab-btn" onclick="showTab('liste',this)">📋 Liste</button>
  <button class="tab-btn" onclick="showTab('statistik',this)">📊 Statistik</button>
</div>

<!-- ══ ERFASSEN ══ -->
<div id="tab-erfassen" class="section active">

  <div class="card">
    <div class="card-title">Fahrer auswählen</div>
    <div class="chips" id="chips">
      <span class="chip" onclick="waehleF('Diriye','157',this)">Diriye</span>
      <span class="chip" onclick="waehleF('Issam','180',this)">Issam</span>
      <span class="chip" onclick="waehleF('Kevin','920',this)">Kevin</span>
      <span class="chip" onclick="waehleF('Müslüm','185',this)">Müslüm</span>
      <span class="chip" onclick="waehleF('Suphi','185',this)">Suphi</span>
      <span class="chip" onclick="waehleF('Askender','157',this)">Askender</span>
      <span class="chip" onclick="waehleF('Ibrahim','157',this)">Ibrahim</span>
      <span class="chip" onclick="waehleF('A. Polat','',this)">A. Polat</span>
      <span class="chip" onclick="waehleF('Murat','',this)">Murat</span>
      <span class="chip" onclick="waehleF('Ilhan','',this)">Ilhan</span>
    </div>
    <div class="row2">
      <div class="field">
        <label>Fahrer</label>
        <input id="f-fahrer" type="text" placeholder="Name">
      </div>
      <div class="field">
        <label>Taxi-Nr.</label>
        <input id="f-taxi" type="text" placeholder="157">
      </div>
    </div>
    <div class="field">
      <label>Datum</label>
      <input id="f-datum" type="date">
    </div>
  </div>

  <div class="card">
    <div class="card-title">Taxameter-Werte</div>
    <div class="field">
      <label>Total — Anfang / Ende</label>
      <div class="row2">
        <input id="f-total-a" type="number" placeholder="Anfang" step="0.1">
        <input id="f-total-e" type="number" placeholder="Ende" step="0.1">
      </div>
    </div>
    <div class="field">
      <label>Touren — Anfang / Ende</label>
      <div class="row2">
        <input id="f-tour-a" type="number" placeholder="Anfang" oninput="berechne()">
        <input id="f-tour-e" type="number" placeholder="Ende" oninput="berechne()">
      </div>
    </div>
    <div class="field">
      <label>Fahrpreis — Anfang / Ende</label>
      <div class="row2">
        <input id="f-fp-a" type="number" placeholder="Anfang" step="0.01" oninput="berechne()">
        <input id="f-fp-e" type="number" placeholder="Ende" step="0.01" oninput="berechne()">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Abzüge</div>
    <div id="abzug-container"></div>
    <button class="add-abzug" onclick="addAbzug()">+ Abzug hinzufügen</button>
    <div class="summary">
      <div class="sum-row"><span class="lbl">Tages-Fahrpreis</span><span id="s-fp">0,00 €</span></div>
      <div class="sum-row"><span class="lbl">Tages-Touren</span><span id="s-tour">0</span></div>
      <div class="sum-row"><span class="lbl">Abzüge gesamt</span><span id="s-abz" style="color:var(--red)">− 0,00 €</span></div>
      <div class="sum-row total">
        <span>Bar-Summa</span>
        <span id="s-bar" style="color:var(--green)">0,00 €</span>
      </div>
    </div>
  </div>

  <button class="save-btn" onclick="speichern()">💾 Zettel speichern</button>
  <div class="toast" id="toast">✅ Zettel gespeichert!</div>
</div>

<!-- ══ LISTE ══ -->
<div id="tab-liste" class="section">
  <div class="filter-bar" id="filter-bar">
    <span class="filter-chip active" onclick="filterFahrer('',this)">Alle</span>
  </div>
  <div id="liste-container"></div>
</div>

<!-- ══ STATISTIK ══ -->
<div id="tab-statistik" class="section">
  <div class="stat-grid" id="stat-grid"></div>
  <div class="card">
    <div class="card-title">Fahrer-Übersicht</div>
    <div id="fahrer-stats"></div>
  </div>
</div>

<script>
const EUR = v => {
  const n = parseFloat(v||0);
  return n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
};
const NUM2 = v => parseFloat(v||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});

let zettelListe = [];
let aktivFilter = '';
let abzugId = 0;

function laden() {
  try { zettelListe = JSON.parse(localStorage.getItem('taxi_zettel')||'[]'); } catch(e){ zettelListe=[]; }
  aktualisierTopbar();
}

function speichernLS() {
  localStorage.setItem('taxi_zettel', JSON.stringify(zettelListe));
  aktualisierTopbar();
}

function aktualisierTopbar() {
  document.getElementById('topbar-count').textContent =
    zettelListe.length + ' Zettel gespeichert';
}

document.getElementById('f-datum').value = new Date().toISOString().split('T')[0];
laden();

function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='liste') renderListe();
  if(id==='statistik') renderStatistik();
}

function waehleF(name, taxi, el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('f-fahrer').value = name;
  if(taxi) document.getElementById('f-taxi').value = taxi;
}

function addAbzug(typ, betrag) {
  const id = ++abzugId;
  const c = document.getElementById('abzug-container');
  const typen = ['Tanken','Rechnung','EC-Karte','KF-Abo','Auto-Wäsche','Paschmaki','Festpreis','Sonstiges'];
  const div = document.createElement('div');
  div.className = 'abzug-row';
  div.id = 'abz-'+id;
  div.innerHTML = `
    <input type="number" placeholder="€" step="0.01" value="${betrag||''}" style="width:95px" oninput="berechne()">
    <select onchange="berechne()">${typen.map(t=>`<option${t==typ?' selected':''}>${t}</option>`).join('')}</select>
    <button class="del" onclick="document.getElementById('abz-${id}').remove();berechne()">×</button>
  `;
  c.appendChild(div);
  berechne();
}

function getAbzuege() {
  let total = 0; const list = [];
  document.querySelectorAll('.abzug-row').forEach(r => {
    const b = parseFloat(r.querySelector('input').value||0);
    const t = r.querySelector('select').value;
    total += b;
    if(b) list.push({typ:t, betrag:b});
  });
  return {total, list};
}

function berechne() {
  const fpA = parseFloat(document.getElementById('f-fp-a').value||0);
  const fpE = parseFloat(document.getElementById('f-fp-e').value||0);
  const tA  = parseFloat(document.getElementById('f-tour-a').value||0);
  const tE  = parseFloat(document.getElementById('f-tour-e').value||0);
  const tFP = fpE - fpA;
  const tTour = tE - tA;
  const {total: abzGes} = getAbzuege();
  const bar = tFP - abzGes;
  document.getElementById('s-fp').textContent   = EUR(tFP);
  document.getElementById('s-tour').textContent = Math.round(tTour);
  document.getElementById('s-abz').textContent  = '− '+EUR(abzGes);
  const barEl = document.getElementById('s-bar');
  barEl.textContent = EUR(bar);
  barEl.style.color = bar >= 0 ? 'var(--green)' : 'var(--red)';
}

function speichern() {
  const fahrer = document.getElementById('f-fahrer').value.trim();
  const taxi   = document.getElementById('f-taxi').value.trim();
  const datum  = document.getElementById('f-datum').value;
  if(!fahrer||!datum){ alert('Bitte Fahrer und Datum eingeben!'); return; }

  const fpA   = parseFloat(document.getElementById('f-fp-a').value||0);
  const fpE   = parseFloat(document.getElementById('f-fp-e').value||0);
  const tA    = parseFloat(document.getElementById('f-tour-a').value||0);
  const tE    = parseFloat(document.getElementById('f-tour-e').value||0);
  const totA  = parseFloat(document.getElementById('f-total-a').value||0);
  const totE  = parseFloat(document.getElementById('f-total-e').value||0);
  const {total: abzGes, list: abzList} = getAbzuege();

  zettelListe.unshift({
    id: Date.now(), fahrer, taxi, datum,
    totalA: totA, totalE: totE,
    tourA: tA, tourE: tE,
    fpA, fpE,
    tagesFP: fpE-fpA,
    tagesTour: tE-tA,
    abzGes, abzList,
    bar: fpE-fpA-abzGes,
    ts: new Date().toISOString()
  });
  speichernLS();

  ['f-fahrer','f-taxi','f-total-a','f-total-e','f-tour-a','f-tour-e','f-fp-a','f-fp-e']
    .forEach(id => document.getElementById(id).value='');
  document.getElementById('f-datum').value = new Date().toISOString().split('T')[0];
  document.getElementById('abzug-container').innerHTML='';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
  berechne();

  const t = document.getElementById('toast');
  t.style.display='block';
  setTimeout(()=>t.style.display='none', 2500);
}

function filterFahrer(name, el) {
  aktivFilter = name;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderListe();
}

function loeschen(id) {
  if(!confirm('Zettel löschen?')) return;
  zettelListe = zettelListe.filter(z=>z.id!==id);
  speichernLS();
  renderListe();
}

function renderListe() {
  const fb = document.getElementById('filter-bar');
  const fahrer = [...new Set(zettelListe.map(z=>z.fahrer))];
  fb.innerHTML = `<span class="filter-chip${aktivFilter===''?' active':''}" onclick="filterFahrer('',this)">Alle</span>`;
  fahrer.forEach(f => {
    fb.innerHTML += `<span class="filter-chip${aktivFilter===f?' active':''}" onclick="filterFahrer('${f}',this)">${f}</span>`;
  });

  const gefiltert = aktivFilter ? zettelListe.filter(z=>z.fahrer===aktivFilter) : zettelListe;
  const c = document.getElementById('liste-container');

  if(!gefiltert.length){
    c.innerHTML='<div class="empty"><div class="ico">📋</div>Noch keine Zettel gespeichert.</div>';
    return;
  }

  c.innerHTML = gefiltert.map(z=>`
    <div class="zettel-card">
      <div class="zettel-head">
        <div>
          <div class="zettel-name">${z.fahrer}${z.taxi?` <span class="taxi-badge">Taxi ${z.taxi}</span>`:''}</div>
          <div class="zettel-date">${z.datum.split('-').reverse().join('.')}</div>
        </div>
      </div>
      <div class="zettel-grid">
        <div class="kv"><span class="k">FP-Anfang </span><span class="v">${NUM2(z.fpA)}</span></div>
        <div class="kv"><span class="k">FP-Ende </span><span class="v">${NUM2(z.fpE)}</span></div>
        <div class="kv"><span class="k">Tages-FP </span><span class="v">${NUM2(z.tagesFP)} €</span></div>
        <div class="kv"><span class="k">Touren </span><span class="v">${Math.round(z.tagesTour)}</span></div>
        <div class="kv"><span class="k">Total A </span><span class="v">${NUM2(z.totalA)}</span></div>
        <div class="kv"><span class="k">Total E </span><span class="v">${NUM2(z.totalE)}</span></div>
      </div>
      ${z.abzList&&z.abzList.length?`<div class="abz-line">Abzüge: ${z.abzList.map(a=>`${a.typ} ${NUM2(a.betrag)} €`).join(' · ')}</div>`:''}
      <div class="zettel-footer">
        <div>
          <div style="font-size:12px;color:var(--text3)">Bar-Summa</div>
          <div class="bar-val ${z.bar>=0?'pos':'neg'}">${EUR(z.bar)}</div>
        </div>
        <button class="del-btn" onclick="loeschen(${z.id})">🗑 Löschen</button>
      </div>
    </div>
  `).join('');
}

function renderStatistik() {
  const anz = zettelListe.length;
  const gesFP = zettelListe.reduce((s,z)=>s+(z.tagesFP||0),0);
  const gesBar = zettelListe.reduce((s,z)=>s+(z.bar||0),0);
  const gesAbz = zettelListe.reduce((s,z)=>s+(z.abzGes||0),0);

  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-box"><div class="stat-val">${anz}</div><div class="stat-lbl">Zettel gesamt</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--blue)">${EUR(gesFP)}</div><div class="stat-lbl">Gesamt-Fahrpreis</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--green)">${EUR(gesBar)}</div><div class="stat-lbl">Gesamt Bar-Summa</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--red)">${EUR(gesAbz)}</div><div class="stat-lbl">Gesamt Abzüge</div></div>
  `;

  const fahrer = {};
  zettelListe.forEach(z => {
    if(!fahrer[z.fahrer]) fahrer[z.fahrer]={anz:0,fp:0,bar:0};
    fahrer[z.fahrer].anz++;
    fahrer[z.fahrer].fp  += z.tagesFP||0;
    fahrer[z.fahrer].bar += z.bar||0;
  });

  const sorted = Object.entries(fahrer).sort((a,b)=>b[1].fp-a[1].fp);
  document.getElementById('fahrer-stats').innerHTML = sorted.length
    ? sorted.map(([n,d])=>`
      <div class="fahrer-stat">
        <div>
          <div class="fn">${n}</div>
          <div class="fd">${d.anz} Zettel · FP: ${EUR(d.fp)}</div>
        </div>
        <div class="bar-val ${d.bar>=0?'pos':'neg'}" style="font-size:15px">${EUR(d.bar)}</div>
      </div>`).join('')
    : '<div class="empty">Noch keine Daten.</div>';
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
